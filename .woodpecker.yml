when:
  - event: push
    branch: master
  - event: tag
  - event: manual

steps:
  - name: fmt
    image: rust:1.88-bookworm
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  - name: check
    image: rust:1.88-bookworm
    environment:
      CARGO_REGISTRIES_FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - mkdir -p $CARGO_HOME && printf '[registries.forgejo]\nindex = "sparse+http://100.92.54.45:3002/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n' >> $CARGO_HOME/config.toml
      - export CARGO_REGISTRIES_FORGEJO_TOKEN="token $CARGO_REGISTRIES_FORGEJO_TOKEN"
      - cargo check --workspace

  - name: test
    image: rust:1.88-bookworm
    environment:
      CARGO_REGISTRIES_FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - mkdir -p $CARGO_HOME && printf '[registries.forgejo]\nindex = "sparse+http://100.92.54.45:3002/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n' >> $CARGO_HOME/config.toml
      - export CARGO_REGISTRIES_FORGEJO_TOKEN="token $CARGO_REGISTRIES_FORGEJO_TOKEN"
      - cargo test --workspace

  - name: clippy
    image: rust:1.88-bookworm
    environment:
      CARGO_REGISTRIES_FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - rustup component add clippy
      - mkdir -p $CARGO_HOME && printf '[registries.forgejo]\nindex = "sparse+http://100.92.54.45:3002/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n' >> $CARGO_HOME/config.toml
      - export CARGO_REGISTRIES_FORGEJO_TOKEN="token $CARGO_REGISTRIES_FORGEJO_TOKEN"
      - cargo clippy --workspace -- -D warnings

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
    environment:
      CARGO_REGISTRIES_FORGEJO_TOKEN:
        from_secret: git_auth_token
    settings:
      repo: repo.indexarr.net/indexarr/nzbdav-rs
      registry: repo.indexarr.net
      username:
        from_secret: git_auth_token
      password:
        from_secret: git_auth_token
      tag: latest
      build_args_from_env:
        - CARGO_REGISTRIES_FORGEJO_TOKEN

  - name: build-and-push-release
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: tag
    environment:
      CARGO_REGISTRIES_FORGEJO_TOKEN:
        from_secret: git_auth_token
    settings:
      repo: repo.indexarr.net/indexarr/nzbdav-rs
      registry: repo.indexarr.net
      username:
        from_secret: git_auth_token
      password:
        from_secret: git_auth_token
      tag: ["${CI_COMMIT_TAG}", latest]
      build_args:
        - RELEASE_OPTIMIZED=true
      build_args_from_env:
        - CARGO_REGISTRIES_FORGEJO_TOKEN

  - name: push-ghcr
    image: quay.io/skopeo/stable
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - SRC="docker://repo.indexarr.net/indexarr/nzbdav-rs:$CI_COMMIT_TAG"
      - SRC_CREDS="--src-creds=$FORGEJO_TOKEN:$FORGEJO_TOKEN"
      - DST_CREDS="--dest-creds=AusAgentSmith:$GH_TOKEN"
      - for tag in $CI_COMMIT_TAG latest; do skopeo copy $SRC_CREDS $DST_CREDS $SRC "docker://ghcr.io/ausagentsmith-org/nzbdav-rs:$tag"; done

  - name: github-release
    image: alpine:3.23
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - apk add --no-cache git curl jq
      - |
        TAG="$CI_COMMIT_TAG"
        REPO="AusAgentSmith-org/nzbdav-rs"
        echo "Creating GitHub release $TAG on $REPO"

        git fetch --unshallow origin 2>/dev/null || true
        git remote add github "https://x-access-token:$GH_TOKEN@github.com/$REPO.git" 2>/dev/null || true
        git push github "refs/tags/$TAG" --force

        BODY="## Docker Images\n\n"
        BODY="$BODY- \`ghcr.io/ausagentsmith-org/nzbdav-rs:${TAG}\`\n"
        BODY="$BODY- \`docker.io/ausagentsmith/nzbdav-rs:${TAG}\`\n"

        curl -sf -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"nzbdav-rs $TAG\",\"body\":\"$(echo -e "$BODY")\",\"draft\":false,\"prerelease\":false}" \
          "https://api.github.com/repos/$REPO/releases" > /dev/null

        echo "GitHub release $TAG created"

  - name: push-github
    image: alpine/git
    when:
      - event: push
        branch: master
    environment:
      GH_TOKEN:
        from_secret: github_mirror_token
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - git clone --bare "https://x-access-token:$FORGEJO_TOKEN@repo.indexarr.net/sprooty/nzbdav-rs.git" /tmp/repo.git
      - cd /tmp/repo.git
      - git push --force "https://x-access-token:$GH_TOKEN@github.com/AusAgentSmith-org/nzbdav-rs.git" master:main
      - git push --force "https://x-access-token:$GH_TOKEN@github.com/AusAgentSmith-org/nzbdav-rs.git" --tags 2>/dev/null || true

  - name: push-dockerhub
    image: quay.io/skopeo/stable
    when:
      - event: tag
    environment:
      DOCKERHUB_TOKEN:
        from_secret: dockerhub_token
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - SRC="docker://repo.indexarr.net/indexarr/nzbdav-rs:$CI_COMMIT_TAG"
      - SRC_CREDS="--src-creds=$FORGEJO_TOKEN:$FORGEJO_TOKEN"
      - DST_CREDS="--dest-creds=ausagentsmith:$DOCKERHUB_TOKEN"
      - for tag in $CI_COMMIT_TAG latest; do skopeo copy $SRC_CREDS $DST_CREDS $SRC "docker://docker.io/ausagentsmith/nzbdav-rs:$tag"; done
